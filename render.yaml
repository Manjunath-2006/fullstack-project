services:
  - type: web_service
    name: edutrack-backend
    env: java
    branch: main
    root: backend
    plan: free
    region: oregon
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/edutrack-backend-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: ""
      - key: JWT_SECRET
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        value: ""

  - type: postgres
    name: edutrack-db
    plan: free
    region: oregon
    disk: 10
    autoDeploy: false
